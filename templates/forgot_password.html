<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniPredict AI — Forgot Password</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#0e0f1a;min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow-y:auto;overflow-x:hidden}
.orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:.3;animation:drift 12s infinite alternate}
.o1{width:500px;height:500px;background:#5b5cf6;top:-150px;left:-100px}
.o2{width:400px;height:400px;background:#06b6d4;bottom:-100px;right:-80px;animation-delay:3s}
@keyframes drift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(30px,-30px) scale(1.08)}}
.wrap{position:relative;z-index:10;width:100%;max-width:460px;padding:20px}
.brand{text-align:center;margin-bottom:30px}
.brand-icon{font-size:3rem;display:block;margin-bottom:10px}
.brand-name{font-family:'DM Serif Display',serif;font-size:2rem;color:#0f172a}
.brand-sub{color:rgba(15,23,42,.5);font-size:.88rem;margin-top:5px}
.card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(20px);border-radius:24px;padding:36px 40px}
.card-title{font-size:1.3rem;font-weight:600;color:#0f172a;margin-bottom:6px}
.card-sub{color:rgba(15,23,42,.4);font-size:.86rem;margin-bottom:22px}
.tabs{display:flex;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:4px;margin-bottom:24px;gap:4px}
.tab{flex:1;padding:9px;border:none;background:none;color:rgba(15,23,42,.4);font-size:.83rem;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;border-radius:9px;transition:all .2s}
.tab.active{background:rgba(91,92,246,.35);border:1px solid rgba(91,92,246,.5);color:#0f172a}
.tab:hover:not(.active){color:rgba(15,23,42,.7);background:rgba(255,255,255,.06)}
.field{margin-bottom:16px}
label{display:block;color:rgba(15,23,42,.6);font-size:.82rem;font-weight:500;margin-bottom:7px}
input{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:13px 16px;font-size:.93rem;color:#0f172a;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .25s}
input::placeholder{color:rgba(15,23,42,.22)}
input:focus{border-color:#5b5cf6;background:rgba(91,92,246,.1)}
.hint{font-size:.76rem;color:rgba(15,23,42,.3);margin-top:5px}
.msg{border-radius:10px;padding:11px 15px;font-size:.86rem;margin-bottom:14px;display:none}
.msg.err{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
.msg.ok{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);color:#6ee7b7}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#5b5cf6,#8b5cf6);color:#0f172a;border:none;border-radius:12px;font-size:1rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity .2s,transform .2s;margin-top:4px}
.btn:hover{opacity:.9;transform:translateY(-1px)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.back{display:block;text-align:center;color:rgba(15,23,42,.4);font-size:.83rem;margin-top:18px;text-decoration:none;transition:color .2s}
.back:hover{color:rgba(15,23,42,.7)}
.reset-box{background:rgba(91,92,246,.12);border:1px solid rgba(91,92,246,.3);border-radius:10px;padding:14px 15px;font-size:.83rem;color:#a5a6fb;margin-top:14px;word-break:break-all;display:none;line-height:1.6}
.reset-box a{color:#c4b5fd}
</style>
</head>
<body>
<div class="orb o1"></div><div class="orb o2"></div>
<div class="wrap">
  <div class="brand">
    <span class="brand-icon">🎓</span>
    <div class="brand-name">UniPredict AI</div>
    <div class="brand-sub">Password Recovery</div>
  </div>
  <div class="card">
    <div class="card-title">Forgot Password?</div>
    <div class="card-sub">Choose how you'd like to recover your account.</div>

    <div class="tabs">
      <button class="tab active" id="tabEmailBtn" onclick="switchTab('email')">📧 By Email</button>
      <button class="tab" id="tabBothBtn" onclick="switchTab('both')">🔑 Username + Email</button>
    </div>

    <div class="msg err" id="errMsg"></div>
    <div class="msg ok" id="okMsg"></div>

    <div id="formArea">
      <div id="tab-email">
        <div class="field">
          <label>Registered Email</label>
          <input type="email" id="email1" placeholder="Enter your account email" autocomplete="email">
          <div class="hint">We'll send a password reset link to this address.</div>
        </div>
      </div>
      <div id="tab-both" style="display:none">
        <div class="field">
          <label>Username</label>
          <input type="text" id="usr" placeholder="Enter your username" autocomplete="off">
        </div>
        <div class="field">
          <label>Registered Email</label>
          <input type="email" id="email2" placeholder="Enter your account email" autocomplete="email">
        </div>
      </div>
      <button class="btn" id="btn" onclick="submitForgot()">📧 Send Reset Link</button>
    </div>

    <div class="reset-box" id="resetBox"></div>
  </div>
  <a class="back" href="/login">← Back to Login</a>
</div>
<script>
let currentTab = 'email';

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-email').style.display = tab === 'email' ? 'block' : 'none';
  document.getElementById('tab-both').style.display  = tab === 'both'  ? 'block' : 'none';
  document.getElementById('tabEmailBtn').classList.toggle('active', tab === 'email');
  document.getElementById('tabBothBtn').classList.toggle('active', tab === 'both');
  document.getElementById('errMsg').style.display = 'none';
  document.getElementById('okMsg').style.display  = 'none';
}

document.addEventListener('keydown', function(e) { if (e.key === 'Enter') submitForgot(); });

async function submitForgot() {
  const btn = document.getElementById('btn');
  const err = document.getElementById('errMsg');
  const ok  = document.getElementById('okMsg');
  err.style.display = 'none';
  ok.style.display  = 'none';

  let payload = {};
  if (currentTab === 'email') {
    const email = document.getElementById('email1').value.trim();
    if (!email) { showMsg(err, 'Please enter your email address.'); return; }
    payload = { email: email };
  } else {
    const usr   = document.getElementById('usr').value.trim();
    const email = document.getElementById('email2').value.trim();
    if (!usr || !email) { showMsg(err, 'Please enter both username and email.'); return; }
    payload = { username: usr, email: email };
  }

  btn.disabled = true;
  btn.textContent = 'Sending…';

  try {
    const r = await fetch('/api/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const d = await r.json();

    if (d.success) {
      showMsg(ok, d.message || '✅ Reset link sent! Check your email inbox.');
      document.getElementById('formArea').style.opacity = '.4';
      document.getElementById('formArea').style.pointerEvents = 'none';

      if (d.simulated && d.reset_url) {
        const box = document.getElementById('resetBox');
        box.innerHTML = '⚠️ <strong>Email not configured</strong> — use this link to reset your password:<br><br><a href="' + d.reset_url + '">' + d.reset_url + '</a>';
        box.style.display = 'block';
      }
    } else {
      showMsg(err, d.error || 'Something went wrong. Please try again.');
      btn.disabled = false;
      btn.textContent = '📧 Send Reset Link';
    }
  } catch(e) {
    showMsg(err, 'Connection error. Please try again.');
    btn.disabled = false;
    btn.textContent = '📧 Send Reset Link';
  }
}

function showMsg(el, msg) {
  el.innerHTML = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
