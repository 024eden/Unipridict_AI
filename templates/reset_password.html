<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniPredict AI — Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#0e0f1a;min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow-y:auto;overflow-x:hidden}
.orb{position:fixed;border-radius:50%;filter:blur(80px);opacity:.3;animation:drift 12s infinite alternate}
.o1{width:500px;height:500px;background:#5b5cf6;top:-150px;left:-100px}
.o2{width:400px;height:400px;background:#06b6d4;bottom:-100px;right:-80px;animation-delay:3s}
@keyframes drift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(30px,-30px) scale(1.08)}}
.wrap{position:relative;z-index:10;width:100%;max-width:460px;padding:20px}
.brand{text-align:center;margin-bottom:30px}
.brand-icon{font-size:3rem;display:block;margin-bottom:10px}
.brand-name{font-family:'DM Serif Display',serif;font-size:2rem;color:#0f172a}
.brand-sub{color:rgba(15,23,42,.5);font-size:.88rem;margin-top:5px}
.card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(20px);border-radius:24px;padding:36px 40px}
.card-title{font-size:1.3rem;font-weight:600;color:#0f172a;margin-bottom:6px}
.card-sub{color:rgba(15,23,42,.4);font-size:.86rem;margin-bottom:26px}
.field{margin-bottom:16px}
label{display:block;color:rgba(15,23,42,.6);font-size:.82rem;font-weight:500;margin-bottom:7px}
.pw-wrap{position:relative}
input{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:13px 16px;font-size:.93rem;color:#0f172a;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .25s}
input::placeholder{color:rgba(15,23,42,.22)}
input:focus{border-color:#5b5cf6;background:rgba(91,92,246,.1)}
.pw-wrap input{padding-right:46px}
.eye{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:rgba(15,23,42,.4);font-size:1rem;padding:4px;line-height:1}
.strength{height:4px;border-radius:2px;margin-top:6px;background:#334155;transition:all .3s}
.strength-bar{height:100%;border-radius:2px;transition:all .3s}
.strength-label{font-size:.75rem;color:rgba(15,23,42,.35);margin-top:4px}
.msg{border-radius:10px;padding:11px 15px;font-size:.86rem;margin-bottom:14px;display:none}
.msg.err{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5}
.msg.ok{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);color:#6ee7b7}
.expired-box{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:12px;padding:20px;text-align:center;color:#fca5a5}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#5b5cf6,#8b5cf6);color:#0f172a;border:none;border-radius:12px;font-size:1rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity .2s,transform .2s;margin-top:4px}
.btn:hover{opacity:.9;transform:translateY(-1px)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.back{display:block;text-align:center;color:rgba(15,23,42,.4);font-size:.83rem;margin-top:18px;text-decoration:none;transition:color .2s}
.back:hover{color:rgba(15,23,42,.7)}
</style>
</head>
<body>
<div class="orb o1"></div><div class="orb o2"></div>
<div class="wrap">
  <div class="brand">
    <span class="brand-icon">🎓</span>
    <div class="brand-name">UniPredict AI</div>
    <div class="brand-sub">Set New Password</div>
  </div>
  <div class="card">
    {% if expired %}
    <div class="expired-box">
      <div style="font-size:2rem;margin-bottom:10px">⏰</div>
      <div style="font-weight:600;font-size:1.1rem;margin-bottom:8px">Link Expired</div>
      <div style="font-size:.87rem;opacity:.8">This password reset link has expired or already been used.<br>Please request a new one.</div>
      <a href="/forgot-password" style="display:inline-block;margin-top:18px;background:rgba(91,92,246,.3);border:1px solid rgba(91,92,246,.5);color:#a5a6fb;padding:10px 22px;border-radius:10px;text-decoration:none;font-size:.87rem">Request New Link</a>
    </div>
    {% else %}
    <div class="card-title">🔑 Set New Password</div>
    <div class="card-sub">Choose a strong password for your account.</div>
    <div class="msg err" id="errMsg"></div>
    <div class="msg ok" id="okMsg"></div>
    <div id="formArea">
      <div class="field">
        <label>New Password</label>
        <div class="pw-wrap">
          <input type="password" id="pwd1" placeholder="Enter new password" oninput="checkStrength()" autocomplete="new-password">
          <button type="button" class="eye" onclick="toggleEye('pwd1',this)">👁</button>
        </div>
        <div class="strength"><div class="strength-bar" id="sBar"></div></div>
        <div class="strength-label" id="sLabel"></div>
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <div class="pw-wrap">
          <input type="password" id="pwd2" placeholder="Re-enter new password" autocomplete="new-password">
          <button type="button" class="eye" onclick="toggleEye('pwd2',this)">👁</button>
        </div>
      </div>
      <button class="btn" id="btn" onclick="doReset()">✅ Update Password</button>
    </div>
    {% endif %}
  </div>
  <a class="back" href="/login">← Back to Login</a>
</div>
<script>
const TOKEN = '{{ token }}';
function toggleEye(id, btn){
  const f=document.getElementById(id);
  f.type=f.type==='password'?'text':'password';
  btn.textContent=f.type==='password'?'👁':'🙈';
}
function checkStrength(){
  const v=document.getElementById('pwd1').value;
  const bar=document.getElementById('sBar');
  const lbl=document.getElementById('sLabel');
  let score=0;
  if(v.length>=6) score++;
  if(v.length>=10) score++;
  if(/[A-Z]/.test(v)) score++;
  if(/[0-9]/.test(v)) score++;
  if(/[^A-Za-z0-9]/.test(v)) score++;
  const colors=['#ef4444','#f97316','#eab308','#22c55e','#10b981'];
  const labels=['Very Weak','Weak','Fair','Strong','Very Strong'];
  bar.style.width=(score*20)+'%';
  bar.style.background=colors[score-1]||'#334155';
  lbl.textContent=v?labels[score-1]||'':'';
}
async function doReset(){
  const p1=document.getElementById('pwd1').value;
  const p2=document.getElementById('pwd2').value;
  const btn=document.getElementById('btn');
  const err=document.getElementById('errMsg');
  const ok=document.getElementById('okMsg');
  err.style.display='none'; ok.style.display='none';
  if(!p1||!p2){showMsg(err,'Please fill both fields.');return;}
  if(p1.length<6){showMsg(err,'Password must be at least 6 characters.');return;}
  if(p1!==p2){showMsg(err,'Passwords do not match.');return;}
  btn.disabled=true; btn.textContent='Updating…';
  try{
    const r=await fetch('/api/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:TOKEN,password:p1})});
    const d=await r.json();
    if(d.success){
      showMsg(ok,'✅ '+d.message);
      document.getElementById('formArea').style.display='none';
      setTimeout(()=>window.location.href='/login',2500);
    } else {
      showMsg(err,d.error||'Failed to reset password.');
      btn.disabled=false; btn.textContent='✅ Update Password';
    }
  }catch(e){showMsg(err,'Connection error.');btn.disabled=false;btn.textContent='✅ Update Password';}
}
function showMsg(el,msg){el.textContent=msg;el.style.display='block';}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doReset();});
</script>
</body>
</html>
